name: GitHub Trending → Notion (Daily)

on:
  workflow_dispatch: {} # Allows manual triggering
  schedule:
    # 15:00 UTC is 08:00 AM PDT (Summer)
    - cron: "0 15 * * *"
    # 16:00 UTC is 08:00 AM PST (Winter)
    - cron: "0 16 * * *"

permissions:
  contents: read

concurrency:
  group: github-trending-to-notion
  cancel-in-progress: false

jobs:
  run-crawler:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install and Verify Dependencies
        run: |
          python -m pip install --upgrade pip
          
          # Install pinned deps (avoid surprises / collisions)
          pip install "requests==2.31.0" "beautifulsoup4==4.12.3" "notion-client==2.2.1"
          
          echo "---- pip freeze (notion-related) ----"
          pip freeze | grep -i notion || true
          
          echo "---- python import sanity ----"
          # Verify the module is correctly installed and accessible
          python -c "import notion_client; print('notion_client module:', notion_client)"
          
          # Verify the Client and the query method exist
          python -c "from notion_client import Client; c=Client(auth='dummy'); print('databases endpoint type:', type(c.databases)); print('has databases.query:', hasattr(c.databases,'query'))"

      - name: Run Crawler Script
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID_GITHUB_TRENDING: ${{ secrets.NOTION_DB_ID_GITHUB_TRENDING }}
        run: |
          python main_notion.py
